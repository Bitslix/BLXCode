[build]
rustc-wrapper = "sccache"

# Cross-linkers for Linux release builds (see scripts/release/build.sh).
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

# Faster linking on Windows — rust-lld is bundled with rustup and significantly
# faster than the default MSVC link.exe for the native Tauri backend.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = ["-C", "linker=rust-lld.exe"]
