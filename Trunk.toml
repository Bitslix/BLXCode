[build]
target = "./index.html"

[watch]
# Avoid rebuild loops with Tauri (`cargo tauri dev` touches `target/`, Trunk writes `dist/`).
ignore = ["./src-tauri", "./dist", "./target"]

[serve]
port = 1420
open = false
# Avoid reverse-DNS aliases like `http://localhost.:1420/` (trailing dot) that confuse logs/tools.
disable_address_lookup = true
