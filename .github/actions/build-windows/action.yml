name: "Build Windows bundle"
description: "Shared Windows build steps for blxcode-win-fast (primary) and blxcode-win (fallback) runners."

inputs:
  mode:
    description: "testbuild = workflow artifacts only; release-new = draft GitHub release + upload; release-existing = upload to an existing release"
    required: true
  repository:
    description: "owner/repo for tauri-action / gh release uploads"
    required: true
  tag-name:
    description: "Release tag (required for release-new and release-existing)"
    required: false
    default: ""
  github-token:
    description: "GITHUB_TOKEN for tauri-action / gh CLI"
    required: false
    default: ""
  tauri-signing-private-key:
    description: "Tauri updater signing key (PEM string)"
    required: false
    default: ""
  tauri-signing-private-key-password:
    description: "Tauri updater signing key password"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Rust (Windows)
      shell: cmd
      run: |
        set "CARGO_HOME=%USERPROFILE%\.cargo"
        set "RUSTUP_HOME=%USERPROFILE%\.rustup"
        set "PATH=%CARGO_HOME%\bin;%PATH%"
        set "RUSTUP=%CARGO_HOME%\bin\rustup.exe"
        if exist "%RUSTUP%" goto configure
        echo Bootstrapping rustup...
        curl -sSf -o "%RUNNER_TEMP%\rustup-init.exe" https://win.rustup.rs/x86_64
        if errorlevel 1 exit /b 1
        "%RUNNER_TEMP%\rustup-init.exe" -y --default-toolchain stable-msvc
        if not exist "%RUSTUP%" exit /b 1
        :configure
        rustc -V >nul 2>&1 && goto add_target
        echo No active toolchain, setting stable-msvc...
        "%RUSTUP%" default stable-msvc
        if errorlevel 1 (
          echo rustup default failed, retrying...
          ping 127.0.0.1 -n 6 >nul
          "%RUSTUP%" default stable-msvc
        )
        if errorlevel 1 (
          echo ERROR: cannot reach static.rust-lang.org from this runner.
          echo Run once on the runner host: rustup default stable-msvc
          exit /b 1
        )
        :add_target
        "%RUSTUP%" target add wasm32-unknown-unknown
        rustc -V
        cargo -V

    - name: Export Rust PATH (Windows)
      shell: cmd
      run: echo PATH=%USERPROFILE%\.cargo\bin;%PATH%>>%GITHUB_ENV%

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: frontend-js/package-lock.json

    - name: Install frontend dependencies
      shell: cmd
      run: npm ci --prefix frontend-js

    - name: Install Trunk and Tauri CLI
      shell: cmd
      run: |
        cargo install trunk --locked
        cargo install tauri-cli --version "^2" --locked

    - name: Ensure VBSCRIPT for WiX MSI (Windows)
      shell: cmd
      run: call scripts\ci\ensure-vbscript.cmd

    # cargo tauri build for testbuild AND release-existing. For release-existing we don't want
    # tauri-action to create/overwrite a release; we'll upload the artifacts ourselves below.
    - name: Build bundles (cargo tauri build, Windows)
      if: inputs.mode == 'testbuild' || inputs.mode == 'release-existing'
      shell: cmd
      working-directory: src-tauri
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.tauri-signing-private-key }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.tauri-signing-private-key-password }}
        CI: "true"
        CSC_IDENTITY_AUTO_DISCOVERY: "false"
        APPLE_SIGNING_IDENTITY: "-"
      run: cargo tauri build %TAURI_BUILD_ARGS%

    - name: Upload test build artifacts
      if: inputs.mode == 'testbuild'
      uses: actions/upload-artifact@v4
      with:
        name: blxcode-windows-${{ github.run_id }}-${{ github.run_attempt }}-${{ runner.name }}
        path: target/**/release/bundle/**/*
        retention-days: 7
        if-no-files-found: error

    # Pin v0.5.20 (node20): @v0 requires node24; self-hosted runners < 2.320 fail at job setup
    # while resolving action manifests (including skipped release-only steps in testbuild runs).
    - name: Build bundles + create draft release (release-new)
      if: inputs.mode == 'release-new'
      uses: tauri-apps/tauri-action@v0.5.20
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.tauri-signing-private-key }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.tauri-signing-private-key-password }}
        CI: "true"
        CSC_IDENTITY_AUTO_DISCOVERY: "false"
        APPLE_SIGNING_IDENTITY: "-"
      with:
        projectPath: src-tauri
        tagName: ${{ inputs.tag-name }}
        releaseName: "BLXCode ${{ inputs.tag-name }}"
        releaseBody: "See [CHANGELOG.md](https://github.com/${{ inputs.repository }}/blob/main/CHANGELOG.md) for details."
        releaseDraft: true
        prerelease: false
        args: ${{ env.TAURI_BUILD_ARGS }}

    # All file-listing / gh-release-upload steps below use `shell: powershell` (Windows PS 5.1).
    # Reason: `shell: bash` on a self-hosted Windows runner falls back to Git Bash (must be on
    # PATH) and then to WSL. The blxcode-win runner has neither, so `bash` blows up with
    # "Windows-Subsystem fuer Linux verfuegt ueber keine installierten Distributionen". PS 5.1
    # is built into every Windows install, so it works on both blxcode-win-fast and blxcode-win
    # without extra provisioning.

    # tauri-action (v0.5.x) only uploads the first installer it finds per bundle directory
    # (typically *-setup.exe + *-setup.exe.sig). We additionally publish:
    #   - *.msi + *.msi.sig (WiX installer + updater signature) when present
    #   - *-setup.nsis.zip / *.msi.zip + their .sig files (only emitted when the project uses
    #     createUpdaterArtifacts: "v1Compatible" in tauri.conf.json; harmless no-op otherwise)
    # That way the release page is consistent regardless of which updater-artifact mode the
    # project is configured for, and missing files are silently skipped.
    - name: Upload remaining Windows installer artifacts (release-new)
      if: inputs.mode == 'release-new'
      shell: powershell
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repository }}
        TAG: ${{ inputs.tag-name }}
      run: |
        $ErrorActionPreference = 'Stop'
        $files = Get-ChildItem -Path 'target' -Recurse -File -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -like '*\release\bundle\*' } |
          Where-Object {
            $_.Name -like '*-setup.nsis.zip' -or
            $_.Name -like '*-setup.nsis.zip.sig' -or
            $_.Name -like '*.msi' -or
            $_.Name -like '*.msi.sig' -or
            $_.Name -like '*.msi.zip' -or
            $_.Name -like '*.msi.zip.sig'
          }
        if (-not $files -or $files.Count -eq 0) {
          Write-Host "::warning::No extra Windows installer artifacts found (zip-wrapped updater payloads / MSI). Updater latest.json may be incomplete."
          exit 0
        }
        foreach ($f in $files) {
          Write-Host "Uploading $($f.FullName)"
          & gh release upload $env:TAG -R $env:REPO --clobber $f.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }

    - name: Upload bundles to existing release (release-existing)
      if: inputs.mode == 'release-existing'
      shell: powershell
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repository }}
        TAG: ${{ inputs.tag-name }}
      run: |
        $ErrorActionPreference = 'Stop'
        $files = Get-ChildItem -Path 'target' -Recurse -File -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -like '*\release\bundle\*' } |
          Where-Object {
            $_.Name -like '*-setup.exe' -or
            $_.Name -like '*-setup.exe.sig' -or
            $_.Name -like '*-setup.nsis.zip' -or
            $_.Name -like '*-setup.nsis.zip.sig' -or
            $_.Name -like '*.msi' -or
            $_.Name -like '*.msi.sig' -or
            $_.Name -like '*.msi.zip' -or
            $_.Name -like '*.msi.zip.sig'
          }
        if (-not $files -or $files.Count -eq 0) {
          Write-Host "::error::No Windows bundles found under target\**\release\bundle\"
          exit 1
        }
        foreach ($f in $files) {
          Write-Host "Uploading $($f.FullName)"
          & gh release upload $env:TAG -R $env:REPO --clobber $f.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }

    - name: Merge updater latest.json
      if: inputs.mode == 'release-new' || inputs.mode == 'release-existing'
      shell: powershell
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TAG_NAME: ${{ inputs.tag-name }}
        REPO: ${{ inputs.repository }}
      run: |
        $ErrorActionPreference = 'Stop'
        $signatures = Get-ChildItem -Path 'target' -Recurse -File -Filter '*.sig' -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -like '*\release\bundle\*' }
        if (-not $signatures -or $signatures.Count -eq 0) {
          Write-Host "No updater signatures found; skipping latest.json"
          exit 0
        }
        $version = $env:TAG_NAME -replace '^v', ''
        $pyArgs = @(
          'scripts/release/merge_latest_json.py',
          '--repo',    $env:REPO,
          '--tag',     $env:TAG_NAME,
          '--version', $version,
          '--output',  'target/latest.json'
        ) + ($signatures | ForEach-Object { $_.FullName })
        & python @pyArgs
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        & gh release upload $env:TAG_NAME -R $env:REPO --clobber 'target/latest.json'
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
