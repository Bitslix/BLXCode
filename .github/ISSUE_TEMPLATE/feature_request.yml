name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For early feedback and brainstorming, consider [Discussions → Ideas](https://github.com/Bitslix/BLXCode/discussions/categories/ideas) first.

        Use this template when you want a tracked feature request for maintainers.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is painful, missing, or inefficient today?
      placeholder: "When I …, I have to … which is slow/confusing because …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like BLXCode to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or simpler approaches you thought about

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Workbench / terminals
        - Sidebar / file preview / Git
        - Plans / memory / tasks
        - BLXCode Agent / harness
        - Settings / themes / i18n
        - Build / packaging / updater
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests
          required: true
        - label: This aligns with BLXCode as a local-first desktop workbench (not a cloud IDE replacement)
          required: false
