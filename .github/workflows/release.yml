# Build release bundles on macOS and Windows (no Linux CI).
# macOS .app/.dmg require a macOS runner (Intel + Apple Silicon via universal target).
# Windows builds prefer the fast self-hosted runner (label: blxcode-win-fast) and fall back
# to the slower runner (label: blxcode-win) if the fast runner is offline or its build fails.
# Flow:
#   probe-windows         -> query GitHub API for an online 'blxcode-win-fast' runner
#   build-windows-fast    -> only runs if probe says fast is available
#   build-windows-fallback-> runs when fast is unavailable OR fast ran but its build failed
# Both Windows jobs share the same steps via .github/actions/build-windows (composite action).
#
# RUNNER_PROBE_TOKEN secret (optional): classic PAT with 'repo' scope, or a fine-grained PAT with
# repository 'Administration: Read', so the workflow can list self-hosted runners. GITHUB_TOKEN
# cannot be granted that permission. If the secret is missing, the probe assumes the fast runner
# is available (preserves the previous "try fast first" behavior).
name: Release

permissions:
  contents: write
  actions: read

env:
  # Comma-separated GitHub logins allowed to release on org-owned repos (when != repository_owner).
  RELEASE_MAINTAINERS: iptoux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        description: "What to do with the build"
        type: choice
        required: true
        default: testbuild
        options:
          - testbuild          # build only, upload as workflow artifact
          - release-new        # build + create a new draft release with release_tag
          - release-existing   # build + upload artifacts to an existing release (release_tag must exist)
      release_tag:
        description: "Tag name (e.g. v0.2.6). Required for release-new (will be created) and release-existing (must already exist). Ignored for testbuild."
        required: false
        default: ""
      platforms:
        description: Build targets
        type: choice
        required: true
        default: Alle
        options:
          - Alle
          - Mac Universal
          - Windows

# Only the repository owner may trigger release builds (manual run or version tag push).
# On user-owned repos: github.actor must equal github.repository_owner.
# On org-owned repos: set repository variable RELEASE_OWNER to the GitHub login allowed to release.
jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Require repository owner (or RELEASE_OWNER on org repos)
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const owner = context.payload.repository.owner.login;
            const maintainers = (process.env.RELEASE_MAINTAINERS || "")
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean);

            if (actor === owner) {
              core.info(`Authorized: repository owner @${actor}`);
              return;
            }

            if (maintainers.includes(actor)) {
              core.info(`Authorized: RELEASE_MAINTAINERS @${actor}`);
              return;
            }

            let releaseOwner = "";
            try {
              const { data } = await github.rest.actions.getRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "RELEASE_OWNER",
              });
              releaseOwner = data.value ?? "";
            } catch (error) {
              if (error.status !== 404 && error.status !== 403) {
                throw error;
              }
              core.warning(
                `Could not read RELEASE_OWNER (HTTP ${error.status}); set the variable or use the org owner account.`
              );
            }

            if (releaseOwner && actor === releaseOwner) {
              core.info(`Authorized: RELEASE_OWNER @${actor}`);
              return;
            }

            core.error(
              `Release denied for @${actor}. Only @${owner} may run this workflow.`
            );
            if (owner !== actor && !releaseOwner) {
              core.error(
                "Org repo? Set Settings → Secrets and variables → Actions → Variable RELEASE_OWNER to your GitHub login."
              );
            }
            core.setFailed("Unauthorized release actor");

  resolve:
    needs: authorize
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      release_tag: ${{ steps.mode.outputs.release_tag }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      build_mac: ${{ steps.targets.outputs.build_mac }}
      build_windows: ${{ steps.targets.outputs.build_windows }}
      has_mac_entries: ${{ steps.targets.outputs.has_mac_entries }}
    steps:
      # Decide mode + tag, and validate against the GitHub API so we fail early (in resolve)
      # rather than after a 30-minute Windows build.
      #   push event:        always mode=release-new, tag=github.ref_name (the pushed v* tag).
      #   workflow_dispatch: mode comes from input; release_tag is validated per mode.
      - id: mode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            mode="release-new"
            release_tag="${GITHUB_REF_NAME}"
          else
            mode="${{ inputs.mode }}"
            release_tag="${{ inputs.release_tag }}"
          fi

          case "$mode" in
            testbuild)
              # Tag is irrelevant for testbuild; null it out so downstream steps don't misuse it.
              release_tag=""
              ;;
            release-new)
              if [ -z "$release_tag" ]; then
                echo "::error::mode=release-new requires the 'release_tag' input (e.g. v0.2.7)."
                exit 1
              fi
              if gh release view "$release_tag" -R "$REPO" >/dev/null 2>&1; then
                echo "::error::Release '$release_tag' already exists. Use mode=release-existing to upload to it, or choose a different tag."
                exit 1
              fi
              ;;
            release-existing)
              if [ -z "$release_tag" ]; then
                echo "::error::mode=release-existing requires the 'release_tag' input. Available releases:"
                gh release list -R "$REPO" --limit 20 || true
                exit 1
              fi
              if ! gh release view "$release_tag" -R "$REPO" >/dev/null 2>&1; then
                echo "::error::Release '$release_tag' does not exist. Available releases:"
                gh release list -R "$REPO" --limit 20 || true
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown mode: $mode"
              exit 1
              ;;
          esac

          echo "Resolved mode=$mode release_tag=$release_tag"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - id: targets
        run: |
          platforms="${{ inputs.platforms }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            platforms="Alle"
          fi

          build_mac=false
          build_windows=false
          if [ "$platforms" = "Alle" ] || [ "$platforms" = "Mac Universal" ]; then
            build_mac=true
          fi
          if [ "$platforms" = "Alle" ] || [ "$platforms" = "Windows" ]; then
            build_windows=true
          fi

          echo "build_mac=${build_mac}" >> "$GITHUB_OUTPUT"
          echo "build_windows=${build_windows}" >> "$GITHUB_OUTPUT"
          echo "has_mac_entries=${build_mac}" >> "$GITHUB_OUTPUT"

      - id: matrix
        run: |
          include="["
          sep=""
          if [ "${{ steps.targets.outputs.build_mac }}" = "true" ]; then
            include+="${sep}{\"platform\":\"macos-latest\",\"platform_id\":\"mac\",\"args\":\"--target universal-apple-darwin\"}"
            sep=","
          fi
          include+="]"

          echo "matrix={\"include\":${include}}" >> "$GITHUB_OUTPUT"

  build:
    needs: [authorize, resolve]
    if: needs.resolve.outputs.has_mac_entries == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (macOS)
        if: matrix.platform_id == 'mac'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-js/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend-js

      - name: Add macOS Rust targets
        if: matrix.platform_id == 'mac'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          echo "macOS universal build: Apple Silicon (aarch64) + Intel (x86_64)"

      - name: Install Trunk and Tauri CLI
        run: |
          cargo install trunk --locked
          cargo install tauri-cli --version "^2" --locked

      # cargo tauri build for testbuild AND release-existing (we don't want tauri-action to
      # create or replace a release in release-existing mode; we'll upload artifacts ourselves).
      - name: Build bundles (cargo tauri build, macOS)
        if: (needs.resolve.outputs.mode == 'testbuild' || needs.resolve.outputs.mode == 'release-existing') && matrix.platform_id == 'mac'
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_SIGNING_IDENTITY: "-"
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload test build artifacts
        if: needs.resolve.outputs.mode == 'testbuild'
        uses: actions/upload-artifact@v4
        with:
          name: blxcode-${{ matrix.platform_id }}-${{ github.run_id }}
          path: target/**/release/bundle/**/*
          retention-days: 7
          if-no-files-found: error

      # Pin v0.5.20 (node20): @v0 requires node24; self-hosted runners < 2.320 fail at job setup
      # while resolving action manifests (including skipped release-only steps in testbuild runs).
      - name: Build bundles + create draft release (release-new)
        if: needs.resolve.outputs.mode == 'release-new'
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Unsigned installers (no Apple / Windows code-signing cert in CI).
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: src-tauri
          tagName: ${{ needs.resolve.outputs.release_tag }}
          releaseName: "BLXCode ${{ needs.resolve.outputs.release_tag }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload bundles to existing release (release-existing, macOS)
        if: needs.resolve.outputs.mode == 'release-existing' && matrix.platform_id == 'mac'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          # macOS /bin/bash is 3.2 (no mapfile); use read loop instead.
          files=()
          while IFS= read -r f; do
            files+=("$f")
          done < <(find target -path '*/release/bundle/*' -type f \( \
            -name '*.dmg' \
            -o -name '*.app.tar.gz' \
            -o -name '*.app.tar.gz.sig' \
            -o -name '*.sig' \
          \))
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No macOS bundles found under target/**/release/bundle/"
            exit 1
          fi
          printf 'Uploading %s\n' "${files[@]}"
          gh release upload "$TAG" -R "$REPO" --clobber "${files[@]}"

      - name: Merge updater latest.json
        if: needs.resolve.outputs.mode == 'release-new' || needs.resolve.outputs.mode == 'release-existing'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          signatures=()
          while IFS= read -r sig; do
            signatures+=("$sig")
          done < <(find target -path '*/release/bundle/*' -name '*.sig' -type f)
          if [[ ${#signatures[@]} -eq 0 ]]; then
            echo "No updater signatures found; skipping latest.json"
            exit 0
          fi
          version="${TAG#v}"
          python scripts/release/merge_latest_json.py \
            --repo "$REPO" \
            --tag "$TAG" \
            --version "$version" \
            --output target/latest.json \
            "${signatures[@]}"
          gh release upload "$TAG" -R "$REPO" --clobber target/latest.json

  # Probe whether at least one 'blxcode-win-fast' self-hosted runner is currently online.
  # We need this because GitHub's `timeout-minutes` only counts elapsed *running* time, so a
  # job assigned to an offline runner would sit in the queue indefinitely instead of failing
  # over to the slow runner.
  #
  # Requires the optional RUNNER_PROBE_TOKEN secret (classic PAT with `repo` scope, or a
  # fine-grained PAT with repository "Administration: Read"). Without it we assume the fast
  # runner is available so we don't regress to "fallback only" by accident.
  probe-windows:
    needs: [authorize, resolve]
    if: needs.resolve.outputs.build_windows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      fast_available: ${{ steps.probe.outputs.fast_available }}
    steps:
      - id: probe
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "RUNNER_PROBE_TOKEN not set; assuming fast runner is available."
            echo "fast_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count online runners that carry the 'blxcode-win-fast' label. Busy ones still count
          # (they'll just queue briefly). Offline ones do not, so we skip straight to fallback.
          count=$(gh api --paginate "repos/${REPO}/actions/runners" \
            --jq '[.runners[]
                   | select(.status == "online")
                   | select(any(.labels[]?; .name == "blxcode-win-fast"))
                  ] | length' 2>/dev/null || echo "")

          if [ -z "${count}" ]; then
            echo "::warning::Could not query self-hosted runners (token missing scope?). Assuming fast runner is available."
            echo "fast_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${count}" -gt 0 ]; then
            echo "Fast runner available: ${count} online instance(s) with label 'blxcode-win-fast'."
            echo "fast_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No online 'blxcode-win-fast' runner; skipping fast build and going straight to fallback."
            echo "fast_available=false" >> "$GITHUB_OUTPUT"
          fi

  # Primary Windows build on the fast self-hosted runner. Only scheduled when the probe says
  # at least one fast runner is online, so we never hang in the queue.
  #
  # `continue-on-error: true` keeps the overall workflow from being marked as failed when the
  # fast build fails but the fallback succeeds. NOTE: with continue-on-error on a job, GitHub
  # masks `needs.<job>.result` to `success` even on failure, so the fallback condition must
  # consult `needs.build-windows-fast.outputs.built_ok` (set from the step outcome) instead.
  build-windows-fast:
    needs: [authorize, resolve, probe-windows]
    if: |
      needs.resolve.outputs.build_windows == 'true'
      && needs.probe-windows.outputs.fast_available == 'true'
    permissions:
      contents: write
    runs-on: [self-hosted, Windows, blxcode-win-fast]
    continue-on-error: true
    timeout-minutes: 60
    outputs:
      built_ok: ${{ steps.build.outcome }}
    # Self-hosted Windows: avoid WSL bash; use cmd (no pwsh / execution-policy / encoding issues).
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - id: build
        name: Build Windows bundle (fast runner)
        uses: ./.github/actions/build-windows
        with:
          mode: ${{ needs.resolve.outputs.mode }}
          repository: ${{ github.repository }}
          tag-name: ${{ needs.resolve.outputs.release_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tauri-signing-private-key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          tauri-signing-private-key-password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # Fallback Windows build on the slower self-hosted runner. Runs when either:
  #   - the probe found no online fast runner, OR
  #   - the fast job ran but its build step did not succeed.
  # `cancelled` is excluded so a manually cancelled run does not re-trigger the slow build.
  build-windows-fallback:
    needs: [authorize, resolve, probe-windows, build-windows-fast]
    if: |
      always()
      && needs.resolve.outputs.build_windows == 'true'
      && needs.build-windows-fast.result != 'cancelled'
      && (
        needs.probe-windows.outputs.fast_available != 'true'
        || needs.build-windows-fast.outputs.built_ok != 'success'
      )
    permissions:
      contents: write
    runs-on: [self-hosted, Windows, blxcode-win]
    timeout-minutes: 120
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Report fast-runner outcome
        run: |
          echo probe-windows fast_available: ${{ needs.probe-windows.outputs.fast_available }}
          echo build-windows-fast result:    ${{ needs.build-windows-fast.result }}
          echo build-windows-fast built_ok:  ${{ needs.build-windows-fast.outputs.built_ok }}
          echo Falling back to runner label 'blxcode-win'.

      - name: Build Windows bundle (fallback runner)
        uses: ./.github/actions/build-windows
        with:
          mode: ${{ needs.resolve.outputs.mode }}
          repository: ${{ github.repository }}
          tag-name: ${{ needs.resolve.outputs.release_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tauri-signing-private-key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          tauri-signing-private-key-password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
