# Build release bundles on all three desktop OSes.
# macOS .app/.dmg require a macOS runner (Intel + Apple Silicon via universal target).
# Linux AppImage on Ubuntu CI does not need NO_STRIP; use it on Arch when building locally.
name: Release

permissions:
  contents: write
  actions: read

env:
  # Comma-separated GitHub logins allowed to release on org-owned repos (when != repository_owner).
  RELEASE_MAINTAINERS: iptoux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platforms:
        description: Build targets
        type: choice
        required: true
        default: Alle
        options:
          - Alle
          - Linux (deb, rpm, AppImage)
          - Mac Universal
          - Windows

# Only the repository owner may trigger release builds (manual run or version tag push).
# On user-owned repos: github.actor must equal github.repository_owner.
# On org-owned repos: set repository variable RELEASE_OWNER to the GitHub login allowed to release.
jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Require repository owner (or RELEASE_OWNER on org repos)
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const owner = context.payload.repository.owner.login;
            const maintainers = (process.env.RELEASE_MAINTAINERS || "")
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean);

            if (actor === owner) {
              core.info(`Authorized: repository owner @${actor}`);
              return;
            }

            if (maintainers.includes(actor)) {
              core.info(`Authorized: RELEASE_MAINTAINERS @${actor}`);
              return;
            }

            let releaseOwner = "";
            try {
              const { data } = await github.rest.actions.getRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "RELEASE_OWNER",
              });
              releaseOwner = data.value ?? "";
            } catch (error) {
              if (error.status !== 404 && error.status !== 403) {
                throw error;
              }
              core.warning(
                `Could not read RELEASE_OWNER (HTTP ${error.status}); set the variable or use the org owner account.`
              );
            }

            if (releaseOwner && actor === releaseOwner) {
              core.info(`Authorized: RELEASE_OWNER @${actor}`);
              return;
            }

            core.error(
              `Release denied for @${actor}. Only @${owner} may run this workflow.`
            );
            if (owner !== actor && !releaseOwner) {
              core.error(
                "Org repo? Set Settings → Secrets and variables → Actions → Variable RELEASE_OWNER to your GitHub login."
              );
            }
            core.setFailed("Unauthorized release actor");

  plan:
    needs: authorize
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - name: Select build matrix
        id: targets
        env:
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'Alle' }}
        run: |
          case "$PLATFORMS" in
            Alle)
              matrix='[
                {"platform":"ubuntu-22.04","args":""},
                {"platform":"macos-latest","args":"--target universal-apple-darwin"},
                {"platform":"windows-latest","args":""}
              ]'
              ;;
            "Linux (deb, rpm, AppImage)")
              matrix='[{"platform":"ubuntu-22.04","args":""}]'
              ;;
            "Mac Universal")
              matrix='[{"platform":"macos-latest","args":"--target universal-apple-darwin"}]'
              ;;
            Windows)
              matrix='[{"platform":"windows-latest","args":""}]'
              ;;
            *)
              echo "::error::Unknown platforms choice: $PLATFORMS"
              exit 1
              ;;
          esac
          echo "Selected: $PLATFORMS"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-js/package-lock.json

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Trunk and Tauri CLI
        run: |
          cargo install trunk --locked
          cargo install tauri-cli --version "^2" --locked

      - name: Build Graph 3D bundle
        run: |
          npm ci --prefix frontend-js
          npm --prefix frontend-js run build:graph3d

      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "BLXCode ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
