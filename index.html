<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BLXCode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="css" href="src/workbench/plans_panel/plans-panel.css" />
    <link data-trunk rel="css" href="src/workbench/model_picker/model_picker.css" />
    <link data-trunk rel="css" href="src/workbench/update_dialog.css" />
    <link data-trunk rel="css" href="src/workbench/harness_image_pane/harness_image_pane.css" />
    <link data-trunk rel="css" href="src/workbench/agent_panel/ask_user_card/ask_user_card.css" />
    <link data-trunk rel="css" href="src/workbench/agent_panel/turn_metrics_bar/turn_metrics_bar.css" />
    <link data-trunk rel="copy-dir" href="public" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css"
    />
    <script type="module" src="/public/terminal_bootstrap.mjs"></script>
    <link data-trunk rel="rust" data-wasm-opt="z" />
  </head>
  <body>
    <section
      id="blx-static-boot"
      class="blx-boot blx-boot--static app-shell app-shell--boot"
      role="status"
      aria-live="polite"
      aria-busy="true"
    >
      <div class="blx-boot__grid" aria-hidden="true"></div>
      <div class="blx-boot__frame">
        <div class="blx-boot__brand">
          <div class="blx-boot__mark-wrap" aria-hidden="true">
            <img
              class="blx-boot__mark"
              src="/public/blxcode.png"
              alt=""
              width="128"
              height="128"
              decoding="async"
            />
          </div>
          <div class="blx-boot__copy">
            <p class="blx-boot__eyebrow">Starting BLXCode</p>
            <h1 class="blx-boot__title">BLXCode</h1>
            <p class="blx-boot__status">Preparing the interface</p>
          </div>
        </div>

        <div class="blx-boot__preview" aria-hidden="true">
          <div class="blx-boot__preview-sidebar">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="blx-boot__preview-main">
            <div class="blx-boot__preview-toolbar"></div>
            <div class="blx-boot__preview-workspace">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="blx-boot__preview-panel">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="blx-boot__rail" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </section>
  </body>
</html>
